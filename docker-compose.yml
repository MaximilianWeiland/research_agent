services:
  app:
    build: .
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/research_agent
    depends_on:
      - db

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: research_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
